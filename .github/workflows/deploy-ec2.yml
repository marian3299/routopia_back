name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST secret is empty"
            exit 1
          fi
          echo "Testing TCP connectivity to ${{ secrets.EC2_HOST }}:22"
          nc -vz -w 10 "${{ secrets.EC2_HOST }}" 22

      - name: SSH connectivity check
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo 'SSH OK'; whoami; hostname; pwd"

      - name: Deploy on EC2
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "bash -s" <<EOF
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          cd "${{ secrets.EC2_APP_DIR }}"
          echo "Deploy path: \$(pwd)"

          # Si quedó un Dockerfile local sin trackear de un deploy anterior,
          # impide el checkout de main cuando ahora Dockerfile ya está en el repo.
          if [ -f Dockerfile ] && ! git ls-files --error-unmatch Dockerfile >/dev/null 2>&1; then
            rm -f Dockerfile
          fi

          echo "Syncing repository..."
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          echo "Building jar..."
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

          echo "Replacing container..."
          docker stop routopia_back_app || true
          docker rm routopia_back_app || true

          docker build -t routopia_back:latest .

          docker run -d \
            --name routopia_back_app \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SERVER_ADDRESS=0.0.0.0 \
            -e AWS_ACCESSKEY='${{ secrets.AWS_ACCESSKEY }}' \
            -e AWS_SECRETKEY='${{ secrets.AWS_SECRETKEY }}' \
            -e AWS_REGION='${{ secrets.AWS_REGION }}' \
            -e AWS_S3_BUCKETNAME='${{ secrets.AWS_S3_BUCKETNAME }}' \
            -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            -e JWT_EXPIRATION='${{ secrets.JWT_EXPIRATION }}' \
            routopia_back:latest

          echo "Container status:"
          docker ps --filter name=routopia_back_app
          EOF
